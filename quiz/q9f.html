<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>index</title>
</head>

<body>
    <script>
        document.writeln("<p>start <br>")


        // start solution
        const join = (delimiter) => (accumulator, currentValue) => `${accumulator}${delimiter}${currentValue}`;
        // end solution



        document.writeln("<p>test<br>")

        // tested by

        const res = [1, 2, 3].reduce(join('-')) === '1-2-3';


        document.writeln("<p>result: <br>")

        document.writeln(res)

        document.writeln("<p>")

    </script>

</body>

</html>
